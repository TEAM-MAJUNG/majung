<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>마중 MA-JUNG</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- 카카오맵 SDK (autoload=false: 수동 초기화로 file:// 환경 지원) -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=0fb82d4569015fe9748fbeb03fb0426a&libraries=services&autoload=false"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#2563eb;--blue-d:#1d4ed8;--blue-l:#eff6ff;
  --green:#16a34a;--orange:#ea580c;
  --text:#111827;--muted:#6b7280;--border:#e5e7eb;--bg:#f9fafb;
  --sh:0 4px 20px rgba(0,0,0,.10)
}
html,body{width:100%;height:100%;overflow:hidden;background:#dde4ee;font-family:'Noto Sans KR',sans-serif;color:var(--text)}
.app{width:100%;max-width:430px;height:100vh;margin:0 auto;position:relative;overflow:hidden;background:#fff;box-shadow:0 0 60px rgba(0,0,0,.2)}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .38s cubic-bezier(.4,0,.2,1)}
.screen.gl{transform:translateX(-100%);pointer-events:none}
.screen.gr{transform:translateX(100%);pointer-events:none}
.screen.on{transform:translateX(0)}

/* 카카오 지도 컨테이너 */
.maplayer{flex:1;position:relative;overflow:hidden}
#kakaoMap1,#kakaoMap2,#kakaoMap3{position:absolute;inset:0;width:100%;height:100%}

.topbar{position:absolute;top:0;left:0;right:0;z-index:20;padding:14px 16px 0;display:flex;align-items:center;gap:10px;pointer-events:none}
.topbar > *{pointer-events:auto}
.logo{background:var(--blue);color:#fff;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;box-shadow:var(--sh);display:flex;align-items:center;gap:5px}
.logo em{font-size:10px;opacity:.7;font-style:normal}
.hpill{flex:1;background:rgba(255,255,255,.93);border-radius:10px;padding:7px 12px;font-size:12px;color:var(--muted);box-shadow:var(--sh);text-align:center}
.btm{background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.12);z-index:20;flex-shrink:0}
.handle{width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:10px auto 0}
.pttl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px;padding:10px 18px 4px;text-transform:uppercase}
.slist{padding:0 14px 16px;max-height:240px;overflow-y:auto}
.sitem{display:flex;align-items:center;gap:10px;padding:11px 8px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:10px;transition:background .15s}
.sitem:last-child{border-bottom:none}
.sitem:hover,.sitem.act{background:var(--blue-l)}
.dbdg{background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:700;padding:4px 8px;border-radius:8px;white-space:nowrap;font-family:'DM Mono',monospace;min-width:90px;text-align:center}
.sname{font-size:14px;font-weight:700}
.smeta{font-size:11px;color:var(--muted);margin-top:1px}
.seta{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--blue);margin-left:auto;white-space:nowrap}
.bkhd{padding:12px 16px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.bkbtn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--blue);padding:2px 4px}
.bknm{font-size:15px;font-weight:700}
.bksb{font-size:12px;color:var(--muted);margin-top:1px}
.blist{padding:6px 14px 18px;max-height:290px;overflow-y:auto}
.brow{display:flex;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px solid var(--border)}
.brow:last-child{border-bottom:none}
.bno{background:var(--blue);color:#fff;font-size:14px;font-weight:700;padding:6px 12px;border-radius:10px;min-width:50px;text-align:center;font-family:'DM Mono',monospace}
.bno.soon{background:var(--orange)}
.binfo{flex:1}
.brt{font-size:14px;font-weight:500}
.barr{font-size:12px;margin-top:3px}
.barr.soon{color:var(--orange);font-weight:700}
.barr.norm{color:var(--muted)}
.bbtn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:8px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.bbtn:hover{background:var(--blue-d)}
.nvtop{position:absolute;top:0;left:0;right:0;z-index:20;padding:14px 16px 0;pointer-events:none}
.nvtop > *{pointer-events:auto}
.nvcard{background:rgba(255,255,255,.95);border-radius:14px;padding:12px 16px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px}
.nvic{font-size:22px}
.nvdn{font-size:14px;font-weight:700}
.nvds{font-size:11px;color:var(--muted);margin-top:1px}
.nvbb{background:var(--blue);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;margin-left:auto;font-family:'DM Mono',monospace}
.nvpnl{padding:4px 0 18px}
.nvgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 16px 10px}
.nvst{background:var(--bg);border-radius:12px;padding:12px 14px}
.nslbl{font-size:10px;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;margin-bottom:4px}
.nsval{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);line-height:1}
.nsunit{font-size:12px;font-weight:400;color:var(--muted)}
.hcard{margin:0 16px 10px;background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:14px;padding:14px 18px;color:#fff}
.hctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hctit{font-size:12px;opacity:.8}
.hcst{font-size:13px;font-weight:700;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:20px}
.hctemps{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hcnow{font-size:28px;font-weight:700;font-family:'DM Mono',monospace}
.hcarr{font-size:18px;opacity:.6}
.hctgt{font-size:18px;opacity:.7;font-family:'DM Mono',monospace}
.hcbw{background:rgba(255,255,255,.2);border-radius:6px;height:8px;overflow:hidden}
.hcb{height:100%;background:#fff;border-radius:6px;transition:width .6s ease}
.hcpr{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;opacity:.7}
.canbtn{display:block;margin:0 16px;background:var(--bg);color:var(--muted);border:1.5px solid var(--border);border-radius:12px;padding:11px;width:calc(100% - 32px);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center}
.aovl{position:absolute;inset:0;background:rgba(22,163,74,.93);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;opacity:0;pointer-events:none;transition:opacity .5s}
.aovl.show{opacity:1;pointer-events:auto}
.aovic{font-size:60px;margin-bottom:14px}
.aovtit{font-size:26px;font-weight:700;margin-bottom:8px}
.aovdc{font-size:15px;opacity:.85;text-align:center;line-height:1.7;padding:0 32px}
.aovrst{margin-top:26px;background:#fff;color:var(--green);border:none;border-radius:12px;padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* GPS 버튼 */
.gpsbtn{position:absolute;bottom:16px;right:16px;z-index:20;background:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;box-shadow:var(--sh);cursor:pointer;display:flex;align-items:center;justify-content:center}

/* 로딩 표시 */
.loadmsg{padding:20px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="app">

<!-- ── 화면 1: 지도 + 정류장 목록 ── -->
<div class="screen on" id="s1">
  <div class="maplayer">
    <div id="kakaoMap1"></div>
    <div class="topbar">
      <div class="logo">마중 <em>MA-JUNG</em></div>
      <div class="hpill" id="h1">지도를 탭해 내 위치를 선택하세요</div>
    </div>
    <button class="gpsbtn" onclick="useGPS()" title="현재 위치 사용">📍</button>
  </div>
  <div class="btm">
    <div class="handle"></div>
    <div class="pttl">근처 버스 정류장</div>
    <div class="slist" id="slist">
      <div class="loadmsg">위치를 선택하면 주변 정류장이 표시돼요</div>
    </div>
  </div>
</div>

<!-- ── 화면 2: 버스 도착 정보 ── -->
<div class="screen gr" id="s2">
  <div class="maplayer">
    <div id="kakaoMap2"></div>
    <div class="topbar">
      <div class="logo">마중 <em>MA-JUNG</em></div>
    </div>
  </div>
  <div class="btm">
    <div class="handle"></div>
    <div class="bkhd">
      <button class="bkbtn" onclick="goTo(1)">&#8592;</button>
      <div><div class="bknm" id="s2nm">-</div><div class="bksb" id="s2sb">-</div></div>
    </div>
    <div class="blist" id="bl"><div class="loadmsg">🔄 버스 정보 불러오는 중...</div></div>
  </div>
</div>

<!-- ── 화면 3: 내비게이션 + 냉난방 ── -->
<div class="screen gr" id="s3">
  <div class="maplayer">
    <div id="kakaoMap3"></div>
    <div class="nvtop">
      <div class="nvcard">
        <div class="nvic">&#128205;</div>
        <div><div class="nvdn" id="nvdn">-</div><div class="nvds" id="nvds">-</div></div>
        <div class="nvbb" id="nvbb">-</div>
      </div>
    </div>
    <div class="aovl" id="aovl">
      <div class="aovic">&#127881;</div>
      <div class="aovtit">정류장 도착!</div>
      <div class="aovdc">버스쉘터가 미리 시원하게<br>준비되어 있어요.<br><br>현재 온도 <strong id="atmp">-</strong></div>
      <button class="aovrst" onclick="restart()">처음으로 돌아가기</button>
    </div>
  </div>
  <div class="btm">
    <div class="handle"></div>
    <div class="nvpnl">
      <div class="nvgrid">
        <div class="nvst"><div class="nslbl">남은 거리</div><div class="nsval" id="nvd">-<span class="nsunit">m</span></div></div>
        <div class="nvst"><div class="nslbl">도착까지</div><div class="nsval" id="nve" style="font-size:16px">-</div></div>
      </div>
      <div class="hcard">
        <div class="hctop"><div class="hctit">&#10052; 버스쉘터 냉방 현황</div><div class="hcst" id="hcst">대기</div></div>
        <div class="hctemps">
          <div class="hcnow" id="hcnow">29&#8451;</div>
          <div class="hcarr">&#8594;</div>
          <div class="hctgt">25&#8451;</div>
        </div>
        <div class="hcbw"><div class="hcb" id="hcb" style="width:0%"></div></div>
        <div class="hcpr"><span id="hcpct">냉방 달성률 0%</span><span>목표 25&#8451;</span></div>
      </div>
      <button class="canbtn" onclick="goTo(1)">탑승 취소 / 홈으로</button>
    </div>
  </div>
</div>

</div><!-- .app -->

<script>
/* ═══════════════════════════════════════════════
   설정값
═══════════════════════════════════════════════ */
var TNOW = 29, TTGT = 25, WALK = 1.3;
var BUS_API_KEY = '27cfeb909ef186e6d7fadfdccc6dac5c6d9ffa43133beea2fad0f26da89498fb';

/* ═══════════════════════════════════════════════
   상태 변수
═══════════════════════════════════════════════ */
var myLat = null, myLng = null;   // 내 위치 (WGS84)
var curStop = null;               // 선택한 정류장 객체
var curBusArr = null;             // 선택한 버스 도착 시간(분)
var animId = null;
var nearStops = [];               // 주변 정류장 목록

// 카카오맵 인스턴스
var map1 = null, map2 = null, map3 = null;
// 마커
var myMarker1 = null, myMarker2 = null;
var stopMarkers = [];
var routePolyline2 = null, routePolyline3 = null;
var walkMarker3 = null;  // 화면3 이동 마커

/* ═══════════════════════════════════════════════
   카카오맵 초기화
═══════════════════════════════════════════════ */
function initMaps() {
  var center = new kakao.maps.LatLng(33.2541, 126.4103);

  map1 = new kakao.maps.Map(document.getElementById('kakaoMap1'), {
    center: center, level: 4
  });
  kakao.maps.event.addListener(map1, 'click', function(e) {
    setMyLocation(e.latLng.getLat(), e.latLng.getLng());
  });

  map2 = new kakao.maps.Map(document.getElementById('kakaoMap2'), {
    center: center, level: 4
  });
  map3 = new kakao.maps.Map(document.getElementById('kakaoMap3'), {
    center: center, level: 4
  });
}

/* 클릭 좌표 근처 정류장 검색 후 목록에 추가 */
function tryAddStop(lat, lng) {
  fetch('https://dapi.kakao.com/v2/local/search/keyword.json'
    + '?query=' + encodeURIComponent('정류장')
    + '&x=' + lng + '&y=' + lat
    + '&radius=100&size=3&sort=distance', {
    headers: { 'Authorization': 'KakaoAK ' + KAKAO_REST_KEY }
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.documents && data.documents.length > 0) {
      var s = data.documents[0];
      addStopFromMap(parseFloat(s.y), parseFloat(s.x), s.place_name);
    } else {
      // 정류장 없으면 내 위치 재설정
      setMyLocation(lat, lng);
    }
  }).catch(function(){ setMyLocation(lat, lng); });
}

/* ═══════════════════════════════════════════════
   내 위치 설정
═══════════════════════════════════════════════ */
function setMyLocation(lat, lng) {
  myLat = lat; myLng = lng;
  var pos = new kakao.maps.LatLng(lat, lng);

  // 기존 마커 제거
  if(myMarker1) myMarker1.setMap(null);

  // 내 위치 마커 (파란 원)
  var imgSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png';
  myMarker1 = new kakao.maps.Marker({
    position: pos,
    map: map1,
    title: '내 위치'
  });
  map1.panTo(pos);
  document.getElementById('h1').textContent = '위치 설정됨 — 주변 정류장을 찾는 중...';

  // 주변 정류장 검색 (카카오 장소 검색)
  searchNearStops(lat, lng);
}

function useGPS() {
  document.getElementById('h1').textContent = 'GPS 위치 가져오는 중...';
  if(!navigator.geolocation) {
    alert('이 브라우저에서는 GPS를 지원하지 않아요.');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      setMyLocation(pos.coords.latitude, pos.coords.longitude);
    },
    function() {
      document.getElementById('h1').textContent = 'GPS 오류 — 지도를 직접 탭해주세요';
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

/* ═══════════════════════════════════════════════
   주변 버스 정류장 검색 (카카오 장소 검색 API)
═══════════════════════════════════════════════ */
var KAKAO_REST_KEY = '3e058df11613b3c333ec5cd7e4366aee';

/* ═══════════════════════════════════════════════
   주변 버스 정류장 검색 — 카카오 로컬 REST API
   키워드 "버스정류장"으로 반경 내 검색
═══════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════
   지도 클릭 → 내 위치 설정 + 주변 정류장 안내
═══════════════════════════════════════════════ */
function setMyLocation(lat, lng) {
  myLat = lat; myLng = lng;
  var pos = new kakao.maps.LatLng(lat, lng);
  if(myMarker1) myMarker1.setMap(null);
  myMarker1 = new kakao.maps.Marker({ position: pos, map: map1, title: '내 위치' });
  map1.panTo(pos);
  document.getElementById('h1').textContent = '내 위치 설정됨 — 주변 정류장 검색 중...';
  searchNearStops(lat, lng);
}

/* 지도에서 버스정류장 클릭 시 정류장 추가 */
function addStopFromMap(lat, lng, name) {
  var dist = myLat !== null ? Math.round(calcDist(myLat, myLng, lat, lng)) : 0;
  // 이미 추가된 정류장인지 확인
  var exists = nearStops.some(function(s){
    return Math.abs(s.lat-lat)<0.0001 && Math.abs(s.lng-lng)<0.0001;
  });
  if(exists) return;

  var stop = { name: name||'버스정류장', lat: lat, lng: lng, dist: dist, addr: '' };
  nearStops.push(stop);

  // 마커 추가
  var marker = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(lat, lng),
    map: map1, title: stop.name
  });
  var iw = new kakao.maps.InfoWindow({
    content: '<div style="padding:5px 9px;font-size:12px;font-weight:700;white-space:nowrap">🚌 '+stop.name+'</div>',
    removable: false
  });
  iw.open(map1, marker);
  var idx = nearStops.length - 1;
  kakao.maps.event.addListener(marker, 'click', function(){ selStop(idx); });
  stopMarkers.push(marker);

  renderStopList(nearStops);
  document.getElementById('h1').textContent = '정류장을 선택하세요 ('+nearStops.length+'개)';
}

/* ═══════════════════════════════════════════════
   TAGO 버스정류소정보 API — GPS 좌표 기반 근처 정류장 검색
   End Point: BusSttnInfoInqireService/getCrdntPrxmtSttnList
═══════════════════════════════════════════════ */
function searchNearStops(lat, lng) {
  stopMarkers.forEach(function(m){ m.setMap(null); });
  stopMarkers = []; nearStops = [];
  document.getElementById('slist').innerHTML = '<div class="loadmsg">🔄 주변 정류장 검색 중...</div>';

  var url = 'https://apis.data.go.kr/1613000/BusSttnInfoInqireService/getCrdntPrxmtSttnList'
    + '?serviceKey=' + encodeURIComponent(BUS_API_KEY)
    + '&gpsLati=' + lat
    + '&gpsLong=' + lng
    + '&numOfRows=10'
    + '&_type=json';

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      console.log('[마중] 정류장 검색 결과:', data);
      var items = null;
      try {
        items = data.response.body.items.item;
        if(!Array.isArray(items)) items = [items];
      } catch(e){ items = null; }

      if(!items || items.length === 0) {
        document.getElementById('h1').textContent = '주변 정류장이 없어요. 다른 위치를 클릭해보세요.';
        document.getElementById('slist').innerHTML = '<div class="loadmsg">반경 내 정류장이 없어요.<br>지도를 이동해 다시 클릭해보세요.</div>';
        return;
      }

      nearStops = items.map(function(item) {
        var sLat = parseFloat(item.gpslati || item.gpsLati || 0);
        var sLng = parseFloat(item.gpslong || item.gpsLong || 0);
        return {
          name:    item.nodenm   || item.sttnNm  || '정류장',
          nodeId:  item.nodeid   || item.sttnId  || '',
          cityCode:item.citycode || item.cityCode || '',
          lat:  sLat,
          lng:  sLng,
          dist: Math.round(calcDist(lat, lng, sLat, sLng)),
          addr: item.nodeno || ''
        };
      }).sort(function(a,b){ return a.dist - b.dist; }).slice(0, 6);

      // 지도에 마커 표시
      nearStops.forEach(function(s, i) {
        var marker = new kakao.maps.Marker({
          position: new kakao.maps.LatLng(s.lat, s.lng),
          map: map1, title: s.name
        });
        var iw = new kakao.maps.InfoWindow({
          content: '<div style="padding:5px 9px;font-size:12px;font-weight:700;white-space:nowrap">🚌 '+s.name+'</div>',
          removable: false
        });
        iw.open(map1, marker);
        kakao.maps.event.addListener(marker, 'click', function(){ selStop(i); });
        stopMarkers.push(marker);
      });

      renderStopList(nearStops);
      document.getElementById('h1').textContent = '정류장을 선택하세요 ('+nearStops.length+'개)';

      var bounds = new kakao.maps.LatLngBounds();
      bounds.extend(new kakao.maps.LatLng(lat, lng));
      nearStops.forEach(function(s){
        if(s.lat && s.lng) bounds.extend(new kakao.maps.LatLng(s.lat, s.lng));
      });
      map1.setBounds(bounds);
    })
    .catch(function(e){
      console.error('[마중] 정류장 검색 오류:', e);
      document.getElementById('h1').textContent = '정류장 검색 실패 — 다시 클릭해보세요';
      document.getElementById('slist').innerHTML = '<div class="loadmsg">검색 오류가 발생했어요.<br>지도를 다시 클릭해주세요.</div>';
    });
}
function processStops(){}

/* 정류장 목록 렌더링 */
function renderStopList(stops) {
  var sl = document.getElementById('slist');
  if(!stops || stops.length === 0) {
    sl.innerHTML = '<div class="loadmsg">반경 800m 내 정류장이 없어요.<br>지도를 이동해 위치를 다시 선택해보세요.</div>';
    return;
  }
  var html = '';
  stops.forEach(function(s, i) {
    var etaSec = s.dist / WALK;
    html += '<div class="sitem" onclick="selStop('+i+')">'
      + '<div class="dbdg">도보 '+Math.ceil(etaSec/60)+'분</div>'
      + '<div><div class="sname">'+s.name+'</div><div class="smeta">'+s.dist+'m · '+s.addr+'</div></div>'
      + '<div class="seta">'+s.dist+'m</div>'
      + '</div>';
  });
  sl.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   정류장 선택 → 화면 2
═══════════════════════════════════════════════ */
function selStop(idx) {
  curStop = nearStops[idx];
  if(!curStop) return;

  var etaSec = curStop.dist / WALK;
  document.getElementById('s2nm').textContent = curStop.name;
  document.getElementById('s2sb').textContent = curStop.dist + 'm · 도보 ' + s2s(etaSec) + ' · ' + curStop.addr;

  // 화면2 지도: 내 위치 → 정류장 경로
  goTo(2);
  setTimeout(function() {
    if(myMarker2) myMarker2.setMap(null);
    myMarker2 = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(myLat, myLng),
      map: map2, title: '내 위치'
    });
    new kakao.maps.Marker({
      position: new kakao.maps.LatLng(curStop.lat, curStop.lng),
      map: map2, title: curStop.name
    });
    // 두 점 사이 직선 경로 표시
    if(routePolyline2) routePolyline2.setMap(null);
    routePolyline2 = new kakao.maps.Polyline({
      path: [
        new kakao.maps.LatLng(myLat, myLng),
        new kakao.maps.LatLng(curStop.lat, curStop.lng)
      ],
      strokeWeight: 5, strokeColor: '#2563eb',
      strokeOpacity: 0.85, strokeStyle: 'solid',
      map: map2
    });
    var bounds = new kakao.maps.LatLngBounds();
    bounds.extend(new kakao.maps.LatLng(myLat, myLng));
    bounds.extend(new kakao.maps.LatLng(curStop.lat, curStop.lng));
    map2.setBounds(bounds, 60);
  }, 100);

  // 버스 도착 정보 로드
  loadBusInfo(curStop);
}

/* ═══════════════════════════════════════════════
   공공데이터포털 버스 도착 정보 API
   국토교통부 버스도착정보조회서비스
═══════════════════════════════════════════════ */
function loadBusInfo(stop) {
  document.getElementById('bl').innerHTML = '<div class="loadmsg">🔄 실시간 버스 정보 불러오는 중...</div>';

  if(!stop.nodeId) { renderBusList(null, stop); return; }

  var url = 'https://apis.data.go.kr/1613000/ArvlInfoInqireForCity/getSttnAcctoArvlPrearngeInfoList'
    + '?serviceKey=' + encodeURIComponent(BUS_API_KEY)
    + '&cityCode=' + (stop.cityCode || '36')
    + '&nodeId=' + encodeURIComponent(stop.nodeId)
    + '&numOfRows=10&pageNo=1&_type=json';

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      console.log('[마중] 버스 도착 결과:', data);
      var items = null;
      try {
        items = data.response.body.items.item;
        if(!Array.isArray(items)) items = [items];
      } catch(e){ items = null; }
      renderBusList(items, stop);
    })
    .catch(function(e){
      console.error('[마중] 버스 도착 오류:', e);
      renderBusList(null, stop);
    });
}

function renderBusList(items, stop) {
  var bl = document.getElementById('bl');
  if(!items || items.length === 0) {
    // API 실패 시: 정류장 이름 기반 안내 + 수동 탑승 버튼
    bl.innerHTML = '<div class="loadmsg" style="text-align:left;padding:16px">'
      + '<div style="font-weight:700;margin-bottom:8px;color:var(--text)">실시간 정보를 불러올 수 없어요</div>'
      + '<div style="margin-bottom:12px;line-height:1.7">공공 API 응답이 없거나 해당 정류장 데이터가 없어요.<br>도착 시간을 직접 입력해서 탑승 예고를 할 수 있어요.</div>'
      + '<div style="display:flex;gap:8px;align-items:center">'
      + '<span style="font-size:13px;color:var(--muted)">버스 도착까지</span>'
      + '<input id="manualArr" type="number" min="1" max="60" value="10" style="width:60px;padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-weight:700;text-align:center">'
      + '<span style="font-size:13px;color:var(--muted)">분</span>'
      + '<button class="bbtn" style="margin-left:4px" onclick="boardManual()">탑승 예고</button>'
      + '</div></div>';
    return;
  }

  var html = '';
  items.forEach(function(item) {
    var routeNo  = item.routeno || item.routeNo || '?';
    var arrTime  = item.arrtime || item.arrTime;
    var arrMin   = arrTime ? Math.round(parseInt(arrTime) / 60) : null;
    var soon     = arrMin !== null && arrMin <= 5;
    var dest     = item.nodeid || item.nodeId || '';
    var at = arrMin !== null
      ? (soon
          ? '<div class="barr soon">🔴 '+arrMin+'분 뒤 도착 예정</div>'
          : '<div class="barr norm">'+arrMin+'분 뒤 도착 예정</div>')
      : '<div class="barr norm">도착 예정 정보 없음</div>';
    var btn = arrMin !== null
      ? '<button class="bbtn" onclick="board(\''+routeNo+'\','+arrMin+',\''+dest+'\')">탑승</button>'
      : '';
    html += '<div class="brow">'
      + '<div class="bno'+(soon?' soon':'')+'">'+routeNo+'</div>'
      + '<div class="binfo"><div class="brt">'+routeNo+'번 버스</div>'+at+'</div>'
      + btn+'</div>';
  });
  bl.innerHTML = html;
}

function boardManual() {
  var val = parseInt(document.getElementById('manualArr').value) || 10;
  board('?', val, curStop.name);
}

/* ═══════════════════════════════════════════════
   탑승 버튼 → 화면 3
═══════════════════════════════════════════════ */
function board(busNo, arrMin, dest) {
  if(!curStop || myLat === null) return;
  curBusArr = arrMin;
  var dist   = curStop.dist;
  var etaSec = dist / WALK;

  document.getElementById('nvdn').textContent = curStop.name;
  document.getElementById('nvds').textContent = busNo+'번 · '+arrMin+'분 후 도착';
  document.getElementById('nvbb').textContent = arrMin+'분';
  document.getElementById('nvd').innerHTML = dist+'<span class="nsunit">m</span>';
  document.getElementById('nve').innerHTML = s2s(etaSec);
  document.getElementById('hcnow').textContent = TNOW+'\u00B0C';
  document.getElementById('hcb').style.width = '0%';
  document.getElementById('hcpct').textContent = '냉방 달성률 0%';
  document.getElementById('hcst').textContent = '대기';

  goTo(3);
  setTimeout(function(){ startNavi(dist, etaSec, arrMin); }, 100);
}

/* ═══════════════════════════════════════════════
   내비게이션 + 냉난방 애니메이션 (화면 3)
═══════════════════════════════════════════════ */
function startNavi(totalDist, totalSec, busArrMin) {
  if(animId) cancelAnimationFrame(animId);

  // 화면3 지도 세팅
  if(walkMarker3) walkMarker3.setMap(null);
  var destPos = new kakao.maps.LatLng(curStop.lat, curStop.lng);
  var myPos   = new kakao.maps.LatLng(myLat, myLng);
  new kakao.maps.Marker({ position: destPos, map: map3, title: curStop.name });
  walkMarker3 = new kakao.maps.Marker({ position: myPos, map: map3, title: '나' });
  if(routePolyline3) routePolyline3.setMap(null);
  routePolyline3 = new kakao.maps.Polyline({
    path: [myPos, destPos],
    strokeWeight: 5, strokeColor: '#2563eb',
    strokeOpacity: 0.85, strokeStyle: 'solid', map: map3
  });
  var bounds = new kakao.maps.LatLngBounds();
  bounds.extend(myPos); bounds.extend(destPos);
  map3.setBounds(bounds, 60);

  // 냉난방 로직
  var diff = TNOW - TTGT;
  var preMin = diff >= 6 ? 10 : diff >= 3 ? 7 : 0;
  var userArrMin = totalSec / 60;
  var heatStartSec = (preMin === 0 || userArrMin <= preMin) ? 0 : (userArrMin - preMin) * 60;

  var DUR = Math.min(totalSec * 700, 25000);
  var simSpeed = totalSec / (DUR / 1000);
  var t0 = null;

  function tick(ts) {
    if(!t0) t0 = ts;
    var prog = Math.min((ts - t0) / DUR, 1);

    // 이동 마커 보간
    var lat = myLat + (curStop.lat - myLat) * prog;
    var lng = myLng + (curStop.lng - myLng) * prog;
    if(walkMarker3) walkMarker3.setPosition(new kakao.maps.LatLng(lat, lng));

    // 남은 거리/시간
    var remD = Math.round(totalDist * (1-prog));
    var remS = totalSec * (1-prog);
    document.getElementById('nvd').innerHTML = remD + '<span class="nsunit">m</span>';
    document.getElementById('nve').innerHTML = s2s(remS);

    // 냉난방 계산
    var elapsed = (ts - t0) / 1000;
    var simElapsed = elapsed * simSpeed;
    var hvacElapsed = Math.max(0, simElapsed - heatStartSec);
    var tempDrop = Math.min(diff, hvacElapsed / 60);
    var nowTemp  = (TNOW - tempDrop).toFixed(1);
    var pct      = Math.round((tempDrop / Math.max(diff, 0.01)) * 100);
    document.getElementById('hcb').style.width = pct + '%';
    document.getElementById('hcpct').textContent = '냉방 달성률 ' + pct + '%';
    document.getElementById('hcnow').textContent = nowTemp + '\u00B0C';
    document.getElementById('hcst').textContent = hvacElapsed > 0 ? '가동 중' : '대기';

    if(prog < 1) {
      animId = requestAnimationFrame(tick);
    } else {
      document.getElementById('atmp').textContent = nowTemp + '\u00B0C';
      document.getElementById('aovl').classList.add('show');
    }
  }
  animId = requestAnimationFrame(tick);
}

/* ═══════════════════════════════════════════════
   유틸
═══════════════════════════════════════════════ */
function goTo(n) {
  ['s1','s2','s3'].forEach(function(id,i){
    var el = document.getElementById(id);
    el.classList.remove('on','gl','gr');
    if(i+1 < n)      el.classList.add('gl');
    else if(i+1 > n) el.classList.add('gr');
    else              el.classList.add('on');
  });
  // 지도 크기 재조정 (화면 전환 후 리사이즈 필요)
  setTimeout(function(){
    if(n===1 && map1) map1.relayout();
    if(n===2 && map2) map2.relayout();
    if(n===3 && map3) map3.relayout();
  }, 400);
}

function restart() {
  if(animId) cancelAnimationFrame(animId);
  document.getElementById('aovl').classList.remove('show');
  curStop = null; curBusArr = null;
  goTo(1);
}

function s2s(sec) {
  var m = Math.floor(sec/60), s = Math.round(sec%60);
  return m > 0 ? m+'분 '+s+'초' : s+'초';
}

// 두 좌표 사이 거리 계산 (Haversine, 미터 반환)
function calcDist(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLng = (lng2-lng1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)
        + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
        * Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ═══════════════════════════════════════════════
   앱 시작 — kakao.maps.load()로 SDK 완전 로드 후 실행
   autoload=false 옵션 덕분에 file:// 환경에서도 작동
═══════════════════════════════════════════════ */
window.addEventListener('load', function() {
  kakao.maps.load(function() {
    initMaps();
    // GPS 자동 시도
    if(navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(pos){ setMyLocation(pos.coords.latitude, pos.coords.longitude); },
        function(){ /* 실패 시 지도 클릭으로 */ },
        { enableHighAccuracy: true, timeout: 5000 }
      );
    }
  });
});
